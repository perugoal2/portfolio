  <text x="70" y="90" fill="#F8FAFC" font-family="Arial, sans-serif" font-size="34" font-weight="700">Payments Threat Model</text>
  <text x="70" y="128" fill="#94A3B8" font-family="Arial, sans-serif" font-size="20">Threats around public entry points, service privileges, payment events, and settlement integrity.</text>
  <rect x="90" y="210" width="290" height="130" rx="24" fill="#3F0D12" stroke="#FB7185"/>
  <text x="160" y="265" fill="#FFE4E6" font-family="Arial, sans-serif" font-size="28">Replay / Fraud</text>
  <text x="145" y="300" fill="#FFE4E6" font-family="Arial, sans-serif" font-size="24">Public API threats</text>
  <rect x="520" y="190" width="360" height="420" rx="32" fill="#0F172A" stroke="#FBBF24" stroke-dasharray="16 10"/>
  <text x="595" y="235" fill="#FEF3C7" font-family="Arial, sans-serif" font-size="28">Trust Boundary</text>
  <rect x="580" y="310" width="240" height="110" rx="24" fill="#172554" stroke="#60A5FA"/>
  <text x="640" y="375" fill="#DBEAFE" font-family="Arial, sans-serif" font-size="28">Core Services</text>
  <rect x="980" y="210" width="290" height="130" rx="24" fill="#451A03" stroke="#F59E0B"/>
