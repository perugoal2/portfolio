  <text x="130" y="660" fill="#DCFCE7" font-family="Arial, sans-serif" font-size="22">MFA, short-lived tokens,</text>
  <text x="128" y="690" fill="#DCFCE7" font-family="Arial, sans-serif" font-size="22">signed events, audit logs</text>
  <rect x="980" y="560" width="290" height="140" rx="24" fill="#052E16" stroke="#4ADE80"/>
  <text x="1040" y="620" fill="#DCFCE7" font-family="Arial, sans-serif" font-size="28">Controls</text>
  <text x="1018" y="660" fill="#DCFCE7" font-family="Arial, sans-serif" font-size="22">Least privilege, encryption,</text>
  <text x="1012" y="690" fill="#DCFCE7" font-family="Arial, sans-serif" font-size="22">ledger validation, alerting</text>
